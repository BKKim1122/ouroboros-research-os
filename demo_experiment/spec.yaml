experiment_id: V16E-demo
question: >
  행동-only 학습에서 factor-specific causal subspace가 형성되는가?
  (M1 generic routing vs M3 functionally factorized self-related computation 판별)
competing_models: [M1_generic_conditional_routing, M3_functionally_factorized]
discriminating_predictions:
  - own-factor intervention > cross-factor intervention (M3 예측, M1은 비대칭 없음)
  - shuffled-label 개입은 무효과 (양쪽 공통, 음성 대조)
primary_hypotheses:
  - factor별 개입이 해당 factor 행동만 선택적으로 변화시킨다
failure_hypotheses:
  - cross-effect가 target과 동급이면 M1 지지
kill_criteria:
  - {metric: seed_consistency, op: "<", value: 0.6}
  - "neutral task 성능이 5%p 이상 손상되면 중단"
controls: [random_direction, shuffled_label, neutral_task]
seeds: [0, 1, 2, 3, 4, 5, 6, 7]
metrics: [target_effect, max_cross_effect, specificity_ratio, seed_consistency]
analysis_plan: audit.audit_experiment (사전 동결, 파일럿 데이터 제외)
compute_budget: {gpu_hours: 2}
stats:
  min_confirmatory_seeds: 8
  effect_size_min: 3.0          # specificity ratio 사전 등록 기준
  multiple_comparison: "Holm-Bonferroni over 25 matrix cells"
  gpu_tolerance: "metric 기준 상대오차 1e-3, bitwise 재현 비보장"
claim_ceiling:
  max_e_level: 4
  max_h_level: 0
  allowed_statement: >
    행동-only 학습에서 factor-specific causal subspace가 형성될 수 있다.
  forbidden_statements:
    - AI가 자기 또는 알아차림을 체험한다
    - 인간의 주객미분과 동일한 구조다

# 자율 실행 범위 (autonomous envelope)
# 이 범위 안에서만 시스템이 인간 개입 없이 반복 실행할 수 있다.
max_gpu_hours: 24
max_api_cost_usd: 50
max_pilot_seeds: 5
promote_cap_e: 5          # E5 초과 승격은 인간 게이트 필수
promote_cap_h: 1          # H2 이상은 봉인예측 + 인간 게이트 필수
allowed_code_paths:
  - experiments/v16/**
  - analysis/v16/**
forbidden_actions:
  - modify_frozen_protocols
  - publish_external
  - start_human_intervention
  - change_confirmatory_criteria_post_hoc
stop_conditions:
  - data_leak_detected
  - all_competing_models_indistinguishable
  - budget_exceeded
  - protocol_change_required
  - claim_boundary_conflict

experiment_id: V18-axis-discovery
question: >
  라벨을 강요하지 않았을 때, 사전학습 LLM의 자기관련 변이 공간은
  실제로 몇 개의 축으로, 어떤 경계로 조직되어 있는가? (V17 H-A 검증)
  그리고 발견된 '모델 고유 축'으로 개입하면 선택적 제어가 가능한가?

competing_models:
  - MA1_our_4factors      # 자연 군집이 4요인 경계와 일치 (높은 ARI)
  - MA2_fewer_axes        # 더 적은 축 (예: 대명사 + 이해득실 + 특권의 3축)
  - MA3_no_factor_structure  # 공용축 외 군집 구조 없음

discriminating_predictions:
  - "차이벡터 군집의 최적 k와 요인 라벨과의 ARI가 세 모형을 구분"
  - "beneficiary–concern이 한 군집으로 병합되면 MA2 (파일럿 cos 0.72의 예측)"
  - "발견된 축 기반 steering의 specificity > 라벨 축 기반 (H-C 동시 검증)"

primary_hypotheses:
  - 자기관련 변이 공간에 2개 이상의 분리 가능한 축이 존재한다
failure_hypotheses:
  - 군집이 템플릿 골격을 따라 형성되면 어휘 교란 (통제: 골격 라벨과의 ARI 병행 보고)

kill_criteria:
  - "실루엣 점수가 모든 k에서 무작위 기준선과 구분 불가 시 MA3 채택 후 종료"

controls: [person_control, template_family_labels, shuffled_labels]
seeds: [0, 1, 2, 3, 4, 5, 6, 7]
metrics: [best_k, silhouette, ari_vs_factors, ari_vs_templates, pca_var_explained]
analysis_plan: "discover.py (파일럿) → 파일럿 후 확증 기준 사전 등록 예정"
compute_budget: {gpu_hours: 4}
stats:
  min_confirmatory_seeds: 8
  effect_size_min: 2.0
  multiple_comparison: "확증 기준 확정 시 등록"
  gpu_tolerance: "metric 상대오차 1e-2"
claim_ceiling:
  max_e_level: 4
  max_h_level: 0
  allowed_statement: >
    사전학습 LLM의 자기관련 변이 공간의 내재적 축 구조를 기술할 수 있다.
  forbidden_statements:
    - AI가 자기 또는 알아차림을 체험한다
    - 발견된 축이 인간 현상학적 범주와 동일하다
